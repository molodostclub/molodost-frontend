# Деплой тестового сайта с ветки demo на http://62.109.1.54:5555
# Контейнер molodost-frontend-demo, бекенд тот же что на проде. Не трогает прод (molodost_frontend на порту 3000).
name: Build and Deploy Demo

on:
    push:
        branches:
            - demo

jobs:
    build-and-deploy-demo:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker image (demo)
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/molodostclub/molodost-frontend:demo
                  build-args: |
                      NEXT_PUBLIC_BASE_URL=http://62.109.1.54:5555

            - name: Deploy demo frontend via SSH
              uses: appleboy/ssh-action@v0.1.10
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USERNAME }}
                  password: ${{ secrets.SERVER_PASSWORD }}
                  script: |
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      docker pull ghcr.io/molodostclub/molodost-frontend:demo

                      docker stop molodost-frontend-demo || true
                      docker rm molodost-frontend-demo || true

                      docker network create molodost_net || true

                      docker run -d \
                        --name molodost-frontend-demo \
                        --network molodost_net \
                        -p 5555:3000 \
                        --memory="768m" \
                        --memory-swap="768m" \
                        --cpus="1.0" \
                        --restart unless-stopped \
                        -e NEXT_PUBLIC_BASE_URL="http://62.109.1.54:5555" \
                        -e BACKEND_URL="http://molodost-backend:1337" \
                        -e NODE_OPTIONS="--max-old-space-size=600" \
                        ghcr.io/molodostclub/molodost-frontend:demo
